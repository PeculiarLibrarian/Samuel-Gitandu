inhibit_rules:
  # Rule 1: Critical suppresses warning for same alert and instance
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
  
  # Rule 2: Info/Debug suppresses Error/Failed for same instance
  - source_match_re:
      alertname: '^(InfoWarning|Debug)$'
    target_match_re:
      alertname: '^(.*Error|.*Failed)$'
    equal: ['instance']
  
  # Rule 3: Suppress individual executor node down if global service down
  - source_match:
      alertname: 'ExecutorServiceDown'
      service: 'executor'
    target_match:
      alertname: 'ExecutorNodeDown'
    equal: ['instance']
  
  # Rule 4: Suppress container alerts if node is down
  - source_match:
      alertname: 'NodeDown'
    target_match_re:
      alertname: '(ContainerCPUHigh|ContainerMemoryHigh|ContainerDiskSpaceLow)'
    equal: ['instance']
  
  # Rule 5: Suppress individual resource alerts if host is down
  - source_match:
      alertname: 'HostDown'
    target_match_re:
      alertname: '.*'
    equal: ['instance']
  
  # Rule 6: Suppress blockchain sync alerts if node is down
  - source_match:
      alertname: 'ExecutorNodeDown'
    target_match_re:
      alertname: '(BlockHeightStalled|PeerCountLow|SyncStatusNotProgressing)'
    equal: ['instance']
  
  # Rule 7: Suppress RPC endpoint alerts if RPC health check fails globally
  - source_match:
      alertname: 'RPCHealthCheckFailed'
    target_match:
      alertname: 'RPCEndpointDown'
    equal: ['instance']

templates:
  - '/etc/alertmanager/templates/*.tmpl'
