# =====================================================
# Alertmanager Configuration — PADI Nairobi-01 PROD v2.2
# =====================================================
#
# Sovereign Perfection — Production Observatory v2.2
# Nairobi Node-01 — PADI Sovereign Bureau
#
# CHANGES IN v2.2:
#   ✅ Mock data mute rule (Priority 0)
#   ✅ Null sink receiver for development alerts
#   ✅ Explicit timezone lock (Africa/Nairobi)
#   ✅ Enhanced timezone documentation
#
# CHANGES IN v2.1.1:
#   ✅ Added container inhibition rules
#   ✅ Added maintenance mode downgrade routing
#   ✅ Added webhook payload headers
#   ✅ Verified Slack action button compatibility
#   ✅ Enhanced inhibition rules for cascade suppression
#
# VERSION HISTORY:
#   v2.0: Recursive routing, selective resolution, external heartbeat
#   v2.1: Redundant route removal, .env cleanup
#   v2.1.1: Enhanced inhibition, maintenance routing, webhook headers
#   v2.2: Mock data mute, timezone lock, null sink receiver
#
# Version: 2.2-PROD
# Node: Nairobi-01
# Environment: Production
# Timezone: Africa/Nairobi (EAT)
# =====================================================

global:
  resolve_timeout: 5m
  
  # SMTP Configuration
  smtp_smarthost: '${SMTP_SMARTHOST:-smtp.gmail.com:587}'
  smtp_from: '${SMTP_FROM:-prometheus@padi-nairobi-01}'
  smtp_auth_username: '${SMTP_AUTH_USERNAME:-your-email@gmail.com}'
  smtp_auth_password: '${SMTP_AUTH_PASSWORD:-your-app-password}'
  
  # 🔒 SECURITY: TLS ENFORCEMENT (CRITICAL)
  smtp_require_tls: true
  
  # Slack Configuration
  slack_api_url: '${SLACK_WEBHOOK_URL:-}'

route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service', 'instance', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: '${ALERT_REPEAT_INTERVAL_WARNING:-4h}'

  # Maintenance Windows
  mute_time_intervals:
    - name: 'nairobi_maintenance_window'
      time_intervals:
        - location: 'Africa/Nairobi'  # ✅ EXPLICIT TIMEZONE LOCK
          days_of_week: ['sunday']
          times:
            - start_time: '02:00'
              end_time: '04:00'

  routes:
    # Priority 0: Mock/Development Data Exclusion
    - match:
        env: mock
      receiver: 'null-sink'
      continue: false  # ✅ IMMEDIATE TERMINATION — No cascade

    # Priority 1: Watchdog (External Heartbeat)
    - match:
        alertname: Watchdog
      receiver: 'heartbeat'
      repeat_interval: 1m

    # Priority 2: Criticals (War Room)
    - match:
        severity: critical
      receiver: 'critical-alerts'
      repeat_interval: '${ALERT_REPEAT_INTERVAL_CRITICAL:-15m}'
      continue: true  # ✅ CRITICAL: Allows alert to cascade to service receivers

    # Priority 3: During maintenance, downgrade critical to warning
    - match:
        severity: critical
      receiver: 'maintenance-alerts'
      mute_time_intervals: ['nairobi_maintenance_window']
      continue: true  # Allows cascade to continue even during maintenance

    # Service-specific routes
    - match:
        service: executor
      receiver: 'executor-alerts'
    
    - match:
        service: geth
      receiver: 'infrastructure-alerts'
    
    - match:
        service: monitoring
      receiver: 'devops-alerts'
    
    - match:
        service: node_exporter
      receiver: 'infrastructure-alerts'
    
    # Infrastructure route with maintenance window
    - match:
        service: infrastructure
      receiver: 'infrastructure-alerts'
      mute_time_intervals: ['nairobi_maintenance_window']

receivers:
  - name: 'default'
    email_configs:
      - to: '${EMAIL_INFO:-digest@padi-nairobi-01}'
        send_resolved: false
  
  - name: 'null-sink'
    # ✅ PURPOSE: Discard mock/development alerts entirely
    # No notification channels configured
    # Alerts are logged but silenced
    # Receives: alerts with label env: mock
  
  - name: 'heartbeat'
    webhook_configs:
      - url: '${HEALTHCHECKS_IO_URL:-https://nosnch.in/REPLACE-WITH-YOUR-ACTUAL-PROJECT-SLUG}'
        send_resolved: false
  
  - name: 'critical-alerts'
    slack_configs:
      - channel: '${SLACK_CRITICAL_CHANNEL:-#padi-critical}'
        title: '🚨 CRITICAL ALERT — PADI Nairobi-01'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          *Service:* {{ .Labels.service }}
          
          *Description:*
          {{ .Annotations.description }}
          
          *Summary:*
          {{ .Annotations.summary }}
          {{ end }}
        color: 'danger'
        footer: 'PADI Nairobi-01 — Alertmanager v2.2 | Timezone: EAT'
        send_resolved: true
    
    email_configs:
      - to: '${EMAIL_CRITICAL:-cto@padi-nairobi-01,critical@padi-nairobi-01}'
        headers:
          Subject: '🚨 [CRITICAL] PADI Nairobi-01 Alert'
        html: |
          {{ range .Alerts }}
          <h2>🚨 CRITICAL ALERT</h2>
          <p><strong>Alert:</strong> {{ .Labels.alertname }}</p>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <p><strong>Instance:</strong> {{ .Labels.instance }}</p>
          <p><strong>Service:</strong> {{ .Labels.service }}</p>
          <hr>
          <h3>Description</h3>
          <p>{{ .Annotations.description }}</p>
          <h3>Summary</h3>
          <p>{{ .Annotations.summary }}</p>
          <hr>
          <p><em>Timestamp: {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}</em></p>
          {{ end }}
        send_resolved: true
    
    webhook_configs:
      - url: '${WEBHOOK_CRITICAL_URL:-http://localhost:5000/webhook/critical}'
        http_config:
          headers:
            Content-Type: 'application/json'
            X-PADI-Node: 'nairobi-01'
            X-PADI-Environment: 'production'
            X-PADI-Severity: 'critical'
        send_resolved: true
  
  - name: 'executor-alerts'
    slack_configs:
      - channel: '${SLACK_ALERT_CHANNEL:-#padi-alerts}'
        title: '⚠️  Executor Alert — PADI Nairobi-01'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Instance:* {{ .Labels.instance }}
          
          *Summary:*
          {{ .Annotations.summary }}
          {{ end }}
        color: 'warning'
        footer: 'PADI Nairobi-01 — Alertmanager v2.2 | Timezone: EAT'
        send_resolved: false
    
    email_configs:
      - to: '${EMAIL_EXECUTOR:-nairobi-ops@padi-nairobi-01}'
        headers:
          Subject: '⚠️  [EXECUTOR] PADI Nairobi-01 Alert'
        html: |
          {{ range .Alerts }}
          <h2>⚠️ EXECUTOR ALERT</h2>
          <p><strong>Alert:</strong> {{ .Labels.alertname }}</p>
          <p><strong>Instance:</strong> {{ .Labels.instance }}</p>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <hr>
          <h3>Summary</h3>
          <p>{{ .Annotations.summary }}</p>
          <p><strong>Description:</strong></p>
          <p>{{ .Annotations.description }}</p>
          <hr>
          <p><em>Timestamp: {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}</em></p>
          {{ end }}
        send_resolved: false
    
    webhook_configs:
      - url: '${WEBHOOK_ALERT_URL:-http://localhost:5000/webhook/alerts}'
        http_config:
          headers:
            Content-Type: 'application/json'
            X-PADI-Node: 'nairobi-01'
            X-PADI-Environment: 'production'
            X-PADI-Service: 'executor'
        send_resolved: false
  
  - name: 'infrastructure-alerts'
    slack_configs:
      - channel: '${SLACK_OPS_CHANNEL:-#padi-ops}'
        title: '🔧 Infrastructure Alert — PADI Nairobi-01'
