groups:
  - name: executor_health
    interval: 30s
    rules:
      - alert: ExecutorDown
        expr: up{job="padi_executor"} == 0
        for: 2m
        labels:
          severity: critical
          service: executor
          network: execution
        annotations:
          summary: "PADI Executor is down"
          description: "PADI Executor instance {{ $labels.instance }} has been down for more than 2 minutes."
          impact: "Transaction execution halted"
          action: "Check executor logs: docker logs padi_executor_nairobi_01_prod"
      
      - alert: ExecutorRestarting
        expr: increase(process_start_time_seconds{job="padi_executor"}[1h]) > 5
        for: 5m
        labels:
          severity: warning
          service: executor
          network: execution
        annotations:
          summary: "PADI Executor is restarting frequently"
          description: "PADI Executor has restarted {{ $value }} times in the last hour."
          impact: "Transaction processing may be interrupted"
          action: "Check restart logs for error patterns"
      
      - alert: CircuitBreakerOpen
        expr: padi_executor_circuit_breaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: critical
          service: executor
          network: execution
        annotations:
          summary: "Circuit breaker is OPEN - executor halted"
          description: "Circuit breaker for {{ $labels.instance }} is OPEN. Executor is halting all operations."
          impact: "All transaction execution blocked"
          action: "Investigate the root cause preventing recovery"
      
      - alert: CircuitBreakerHalfOpen
        expr: padi_executor_circuit_breaker_state{state="half_open"} == 1
        for: 2m
        labels:
          severity: warning
          service: executor
          network: execution
        annotations:
          summary: "Circuit breaker is HALF-OPEN - testing recovery"
          description: "Circuit breaker for {{ $labels.instance }} is in HALF-OPEN state, testing if services have recovered."
          impact: "Limited transaction execution"
          action: "Monitor if recovery succeeds"
      
      - alert: StuckTransactionsThresholdExceeded
        expr: padi_executor_stuck_transactions_count > 5
        for: 5m
        labels:
          severity: critical
          service: executor
          network: execution
        annotations:
          summary: "Executor has too many stuck transactions"
          description: "Executor has {{ $value }} stuck transactions (threshold: 5)."
          impact: "Transaction gas may be wasted, operations blocked"
          action: "Check network conditions and gas prices"
      
      - alert: HighTransactionFailureRate
        expr: |
          rate(padi_executor_transactions_failed_total[5m]) / 
          rate(padi_executor_transactions_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: executor
          network: execution
        annotations:
          summary: "High transaction failure rate detected"
          description: "Transaction failure rate is {{ $value | humanizePercentage }} (threshold: 10%)."
          impact: "Transactions may need manual intervention"
          action: "Check RPC endpoint connectivity and gas prices"
      
      - alert: ExecutorNotProcessingTransactions
        expr: |
          rate(padi_executor_transactions_total[10m]) < 0.01
        for: 15m
        labels:
          severity: warning
          service: executor
          network: execution
        annotations:
          summary: "Executor not processing transactions"
          description: "Executor transaction rate is {{ $value | humanize }} transactions/second."
          impact: "No transactions being executed"
          action: "Check if there are transactions to process and RPC connectivity"

  - name: blockchain_node_health
    interval: 30s
    rules:
      - alert: GethNodeDown
        expr: up{job=~"geth_.*"} == 0
        for: 2m
        labels:
          severity: critical
          service: geth
          network: execution
        annotations:
          summary: "Geth node is down"
          description: "{{ $labels.job }} node {{ $labels.instance }} has been down for more than 2 minutes."
          impact: "Cannot interact with {{ $labels.blockchain }} blockchain"
          action: "Check Geth logs: docker logs padi_geth_{{ $labels.job }}_nairobi_01_prod"
      
      - alert: GethNodeAbsoluteBlockLag
        expr: |
          max(ethereum_block_number{job=~"geth_.*"}) by(blockchain) -
          ethereum_block_number{job=~"geth_.*"} > 50
        for: 5m
        labels:
          severity: critical
          service: geth
          network: execution
        annotations:
          summary: "Geth node {{ $labels.blockchain }} is significantly behind"
          description: "{{ $labels.instance }} is {{ $value | humanize }} blocks behind the highest block (threshold: 50 blocks)."
          impact: "Node data is **3-4 minutes stale**. High-frequency execution at risk."
          action: "Check sync status and network connectivity immediately"
      
      - alert: GethNodeModerateBlockLag
        expr: |
          max(ethereum_block_number{job=~"geth_.*"}) by(blockchain) -
          ethereum_block_number{job=~"geth_.*"} > 20
        for: 10m
        labels:
          severity: warning
          service: geth
          network: execution
        annotations:
          summary: "Geth node {{ $labels.blockchain }} is moderately behind"
          description: "{{ $labels.instance }} is {{ $value | humanize }} blocks behind the highest block (threshold: 20 blocks)."
          impact: "Node data is **1-2 minutes stale**. Monitor closely."
          action: "Check if sync is progressing normally"
      
      - alert: GethNodeTimestampLag
        expr: |
          time() - ethereum_timestamp_seconds{job=~"geth_.*"} > 120
        for: 3m
        labels:
          severity: critical
          service: geth
          network: execution
        annotations:
          summary: "Geth node {{ $labels.blockchain }} timestamp is stale"
          description: "{{ $labels.instance }} last block timestamp is {{ $value | humanize }} seconds old (threshold: 120s)."
          impact: "Node is experiencing **time drift** or has stopped syncing."
          action: "Check system clock and Geth sync status"
      
      - alert: GethNodeTimestampLagWarning
        expr: |
          time() - ethereum_timestamp_seconds{job=~"geth_.*"} > 60
        for: 5m
        labels:
          severity: warning
          service: geth
          network: execution
        annotations:
          summary: "Geth node {{ $labels.blockchain }} timestamp lag warning"
          description: "{{ $labels.instance }} last block timestamp is {{ $value | humanize }} seconds old (threshold: 60s)."
          impact: "Moderate timestamp drift detected"
          action: "Monitor for worsening conditions"
      
      - alert: GethNodeNoPeers
        expr: ethereum_peers_count{job=~"geth_.*"} < 1
        for: 10m
        labels:
          severity: critical
          service: geth
          network: execution
        annotations:
          summary: "Geth node has no peers"
          description: "{{ $labels.instance }} has {{ $value }} peers (expected > 0)."
          impact: "Cannot sync or broadcast transactions"
          action: "Check NAT configuration and network connectivity"
      
      - alert: GethNodeLowPeerCount
        expr: ethereum_peers_count{job=~"geth_.*"} < 10
        for: 20m
        labels:
          severity: warning
          service: geth
          network: execution
        annotations:
          summary: "Geth node has low peer count"
          description: "{{ $labels.instance }} has {{ $value }} peers (threshold: 10). May affect sync speed."
          impact: "Slow sync speed, reduced network resilience"
          action: "Check network configuration and NAT settings"
      
      - alert: GethNodeHighMemoryUsage
        expr: |
          container_memory_usage_bytes{com.docker.compose.service=~"geth_.*"} /
          container_spec_memory_limit_bytes{com.docker.compose.service=~"geth_.*"} > 0.95
        for: 5m
        labels:
          severity: warning
          service: geth
          network: execution
        annotations:
          summary: "Geth node high memory usage"
          description: "{{ $labels.instance }} memory usage is {{ $value | humanizePercentage }} of the limit."
          impact: "May cause OOM and node crashes"
          action: "Consider increasing memory limit or investigating memory leak"

  - name: infrastructure_resources
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
          service: node_exporter
          network: monitoring
        annotations:
          summary: "High CPU usage"
          description: "Instance {{ $labels.instance }} CPU usage is {{ $value | humanizePercentage }}."
          impact: "Performance degradation, slow transaction processing"
          action: "Check running processes and scale executor if needed"
      
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
          service: node_exporter
          network: monitoring
        annotations:
          summary: "High memory usage"
          description: "Instance {{ $labels.instance }} memory usage is {{ $value | humanizePercentage }}."
          impact: "可能导致 OOM，容器崩溃"
          action: "Check for memory leaks, consider increasing RAM"
      
      - alert: HighDiskUsage
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: node_exporter
          network: monitoring
        annotations:
          summary: "High disk usage on mountpoint {{ $labels.mountpoint }}"
          description: "Disk usage is {{ $value | humanizePercentage }} (threshold: 85%)."
          impact: "Cannot write logs or persist data, crash risk"
          action: "Clean up old logs, prune Geth data, or increase disk space"
      
      - alert: DiskWillFillSoon
        expr: |
          predict_linear(node_filesystem_avail_bytes{mountpoint="/"}[1h], 4*3600) < 0
        for: 10m
        labels:
          severity: critical
          service: node_exporter
          network: monitoring
        annotations:
          summary: "Disk will fill in less than 4 hours"
          description: "Based on current rate, disk {{ $labels.mountpoint }} will be full in less than 4 hours."
          impact: " imminent crash risk"
          action: "URGENT: clean up data or increase disk space IMMEDIATELY"
      
      - alert: ContainerRestarting
        expr: increase(container_start_time_seconds[1h]) > 5
        for: 10m
        labels:
          severity: warning
          service: infrastructure
          network: monitoring
        annotations:
          summary: "Container {{ $labels.name }} is restarting frequently"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in the last hour."
          impact: "Service instability"
          action: "Check container logs for errors"

  - name: monitoring_system_health
    interval: 30s
    rules:
      - alert: WatchdogAlert
        expr: vector(1)
        labels:
          severity: info
          service: monitoring
          network: monitoring
          alert_type: watchdog
        annotations:
          summary: "Watchdog Alert - Monitoring System Active"
          description: "This alert fires every 5 minutes to confirm the monitoring system is operational. If this alert stops arriving, the Prometheus/Alertmanager stack may be down."
          impact: "External monitoring services should ping when this alert stops arriving"
          action: "Configure external service (Healthchecks.io, UptimeRobot) to monitor for this alert"
      
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
          service: monitoring
          network: monitoring
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus instance {{ $labels.instance }} has been down for more than 2 minutes."
          impact: "No metrics collection, no alerting"
          action: "Check Prometheus logs: docker logs padi_prometheus_nairobi_01_prod"
      
      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 5m
        labels:
          severity: warning
          service: monitoring
          network: monitoring
        annotations:
          summary: "Grafana is down"
          description: "Grafana instance {{ $labels.instance }} has been down for more than 5 minutes."
          impact: "Cannot visualize metrics"
          action: "Check Grafana logs: docker logs padi_grafana_nairobi_01_prod"
      
      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 5m
        labels:
          severity: critical
          service: monitoring
          network: monitoring
        annotations:
          summary: "Alertmanager is down"
          description: "Alertmanager instance {{ $labels.instance }} has been down for more than 5 minutes."
          impact: "No alert notifications sent"
          action: "Check Alertmanager logs: docker logs padi_alertmanager_nairobi_01_prod"
      
      - alert: PrometheusScrapeFailures
        expr: |
          100 * (sum(up == 0 without(instance, job)) / count(up) without(instance, job)) > 10
        for: 5m
        labels:
          severity: warning
          service: monitoring
          network: monitoring
        annotations:
          summary: "Prometheus has high scrape failure rate"
          description: "Scrape failure rate is {{ $value | humanizePercentage }} (threshold: 10%)."
          impact: "Metrics may be incomplete"
          action: "Check job status in Prometheus targets page"
      
      - alert: PrometheusConfigReloadFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 10m
        labels:
          severity: critical
          service: monitoring
          network: monitoring
        annotations:
          summary: "Prometheus configuration reload failed"
          description: "Prometheus failed to reload its configuration."
          impact: "Metrics collection may be incorrect"
          action: "Check Prometheus logs for configuration errors"
